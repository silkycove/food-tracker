<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="食事ログ">
  <title>食事＆体調記録</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
    .log-item { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 5px; }
  </style>
</head>
<body>

  <h2>記録する</h2>
  <div class="form-group">
    <label>日時</label>
    <input type="datetime-local" id="timestamp">
  </div>
  
  <div class="form-group">
    <label>種類</label>
    <select id="eventType">
      <option value="meal">食事</option>
      <option value="snack">間食</option>
      <option value="condition">お腹の調子</option>
    </select>
  </div>

  <div class="form-group">
    <label>食材 / メモ（カンマ区切りなどで入力）</label>
    <textarea id="details" rows="3" placeholder="例: 豚肉, 玉ねぎ, 小麦粉 または お腹が張る"></textarea>
  </div>

  <button onclick="saveLog()">記録を保存</button>

  <h2>タイムライン</h2>
  <div id="timeline"></div>

  <script>
    // ページ読み込み時に現在時刻をセットし、履歴を表示
    window.onload = () => {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('timestamp').value = now.toISOString().slice(0, 16);
      renderTimeline();
    };

    // データの保存処理
    function saveLog() {
      const timestamp = document.getElementById('timestamp').value;
      const eventType = document.getElementById('eventType').value;
      const details = document.getElementById('details').value;

      if (!timestamp) return alert('日時を入力してください');

      const logEntry = {
        id: Date.now().toString(),
        timestamp,
        eventType,
        details
      };

      // ローカルストレージから既存データを取得して追加
      let logs = JSON.parse(localStorage.getItem('healthLogs')) || [];
      logs.push(logEntry);
      
      // 時系列（新しい順）に並び替え
      logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      
      localStorage.setItem('healthLogs', JSON.stringify(logs));
      
      // 入力欄をクリアして再描画
      document.getElementById('details').value = '';
      renderTimeline();
    }

    // 画面への描画処理
    function renderTimeline() {
      const logs = JSON.parse(localStorage.getItem('healthLogs')) || [];
      const timelineDiv = document.getElementById('timeline');
      timelineDiv.innerHTML = '';

      logs.forEach(log => {
        const div = document.createElement('div');
        div.className = 'log-item';
        
        let typeLabel = '';
        if (log.eventType === 'meal') typeLabel = '🍽️ 食事';
        if (log.eventType === 'snack') typeLabel = '🍪 間食';
        if (log.eventType === 'condition') typeLabel = '⚠️ 体調';

        div.innerHTML = `
          <div style="font-size: 0.8em; color: #666;">${log.timestamp.replace('T', ' ')}</div>
          <div style="font-weight: bold; margin: 5px 0;">${typeLabel}</div>
          <div>${log.details}</div>
        `;
        timelineDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
